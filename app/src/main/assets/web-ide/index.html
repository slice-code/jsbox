<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSBox Remote Web Workspace</title>
    <!-- CodeMirror Local Stylesheets -->
    <link rel="stylesheet" href="/libs/codemirror.min.css">
    <link rel="stylesheet" href="/libs/dracula.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0b18;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Top Navigation Header */
        header {
            background-color: #0f0c20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid #1f1b38;
            height: 60px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: #03dac6;
            letter-spacing: 0.5px;
        }
        .logo span {
            color: #bb86fc;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #15122a;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            color: #a0a0c0;
            border: 1px solid #231f47;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #cf6679;
        }
        .status-dot.connected {
            background-color: #03dac6;
            box-shadow: 0 0 8px #03dac6;
        }
        .action-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease-in-out;
            font-family: inherit;
        }
        .btn-play {
            background-color: #03dac6;
            color: #0d0b18;
        }
        .btn-play:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(3, 218, 198, 0.4);
        }
        .btn-save {
            background-color: #1f1b38;
            color: #bb86fc;
            border: 1px solid #bb86fc;
        }
        .btn-save:hover {
            background-color: #bb86fc;
            color: #0d0b18;
        }
        /* Main Layout */
        main {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
        }
        /* Sidebar File Tree */
        aside {
            width: 250px;
            background-color: #120e24;
            border-right: 1px solid #1f1b38;
            display: flex;
            flex-direction: column;
            padding: 16px 0;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 0 16px 12px 16px;
            border-bottom: 1px solid #1e1a38;
            font-size: 0.8rem;
            font-weight: 700;
            color: #7b7b9b;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .file-list {
            list-style: none;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 8px;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            color: #bebed0;
            font-size: 0.9rem;
        }
        .file-item:hover {
            background-color: rgba(187, 134, 252, 0.08);
            color: #ffffff;
        }
        .file-item.active {
            background-color: rgba(3, 218, 198, 0.12);
            color: #03dac6;
            font-weight: 600;
        }
        .file-icon {
            font-size: 1.1rem;
        }
        /* Editor Workspace Canvas */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d0b18;
            position: relative;
        }
        .editor-header {
            background-color: #120e24;
            padding: 6px 20px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1f1b38;
        }
        .active-tab-title {
            font-size: 0.85rem;
            color: #bebed0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .active-tab-title::before {
            content: "•";
            color: #bb86fc;
            font-size: 1.2rem;
        }
        #editor-host {
            flex: 1;
            width: 100%;
            height: calc(100% - 38px);
        }
        /* Custom CodeMirror Dracula Styling Override */
        .CodeMirror {
            height: 100% !important;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
            font-size: 14px;
            background-color: #0d0b18 !important;
        }
        .CodeMirror-gutters {
            background-color: #120e24 !important;
            border-right: 1px solid #1f1b38 !important;
        }
        .editor-overlay-message {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0b18;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            gap: 16px;
            color: #bebed0;
        }
        .spinner {
            border: 4px solid rgba(187, 134, 252, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #bb86fc;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="logo">JS<span>Sandbox</span> Remote</div>
            <div class="status-badge">
                <div class="status-dot" id="ws-dot"></div>
                <span id="ws-text">Menghubungkan...</span>
            </div>
        </div>
        <div class="action-bar">
            <button class="btn btn-save" onclick="saveCurrentFile()" title="Ctrl+S">
                💾 Simpan Berkas
            </button>
            <button class="btn btn-play" onclick="triggerPlay()">
                ⚡ INSTANT RUN (PLAY)
            </button>
        </div>
    </header>

    <main>
        <aside>
            <div class="sidebar-header">Berkas Proyek</div>
            <ul class="file-list" id="file-list-ul">
                <!-- Dinamis di-render -->
            </ul>
        </aside>

        <section class="editor-container">
            <div class="editor-header">
                <div class="active-tab-title" id="tab-title">Tidak ada berkas terpilih</div>
            </div>
            <!-- Div Host for CodeMirror -->
            <div id="editor-host"></div>

            <div class="editor-overlay-message" id="editor-overlay">
                <div class="spinner"></div>
                <p>Memuat CodeMirror Editor IDE Offline...</p>
            </div>
        </section>
    </main>

    <!-- CodeMirror Local Scripts (100% Offline) -->
    <script src="/libs/codemirror.min.js"></script>
    <script src="/libs/javascript.min.js"></script>
    <script>
        let editorInstance = null;
        let activeFilePath = null;
        let wsConnection = null;

        // Initialize CodeMirror immediately
        editorInstance = CodeMirror(document.getElementById('editor-host'), {
            value: '// Silakan pilih berkas di sidebar...',
            mode: 'javascript',
            theme: 'dracula',
            lineNumbers: true,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: true,
            extraKeys: {
                "Ctrl-S": function(cm) {
                    saveCurrentFile();
                }
            }
        });

        // Hide overlay loader immediately (since it's loaded 100% offline!)
        document.getElementById('editor-overlay').style.display = 'none';

        // Bootstrap Remote Application Data
        refreshFiles();
        connectWebSocket();

        // WebSocket Management for Live Connection
        function connectWebSocket() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUri = proto + '//' + window.location.host + '/ws';
            
            wsConnection = new WebSocket(wsUri);
            
            wsConnection.onopen = function () {
                document.getElementById('ws-dot').className = 'status-dot connected';
                document.getElementById('ws-text').innerText = 'Terhubung ke HP';
            };
            
            wsConnection.onclose = function () {
                document.getElementById('ws-dot').className = 'status-dot';
                document.getElementById('ws-text').innerText = 'Terputus, mencoba lagi...';
                setTimeout(connectWebSocket, 3000); // Retry reconnect
            };

            wsConnection.onerror = function (e) {
                console.error("WS Error:", e);
            };

            wsConnection.onmessage = function (event) {
                console.log("WebSocket Message Received:", event.data);
            };
        }

        // Action Trigger
        function triggerPlay() {
            saveCurrentFile().then(() => {
                if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                    wsConnection.send(JSON.stringify({ event: "trigger_play" }));
                    console.log("Play triggered via WebSocket");
                } else {
                    fetch('/api/play', { method: 'POST' })
                        .then(() => console.log('Play triggered via HTTP API fallback'))
                        .catch(e => console.error(e));
                }
            });
        }

        function refreshFiles() {
            fetch('/api/files')
                .then(r => r.json())
                .then(files => {
                    const ul = document.getElementById('file-list-ul');
                    ul.innerHTML = '';
                    
                    files.forEach(file => {
                        const li = document.createElement('li');
                        li.className = 'file-item' + (activeFilePath === file.name ? ' active' : '');
                        
                        const isJs = file.name.endsWith('.js');
                        const isJson = file.name.endsWith('.json');
                        const icon = isJs ? '📜' : (isJson ? '⚙️' : '📄');
                        
                        li.innerHTML = `<span class="file-icon">${icon}</span> ${file.name}`;
                        li.onclick = () => selectFile(file.name);
                        ul.appendChild(li);
                    });

                    if (!activeFilePath && files.length > 0) {
                        const hasMain = files.find(f => f.name === 'main.js');
                        selectFile(hasMain ? 'main.js' : files[0].name);
                    }
                })
                .catch(err => console.error("Error refreshing file listing:", err));
        }

        function selectFile(filename) {
            if (activeFilePath === filename) return;
            
            const loadSelectedFile = () => {
                activeFilePath = filename;
                
                document.querySelectorAll('.file-item').forEach(item => {
                    if (item.innerText.includes(filename)) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                document.getElementById('tab-title').innerText = filename;

                fetch('/api/file?path=' + encodeURIComponent(filename))
                    .then(r => r.text())
                    .then(code => {
                        if (editorInstance) {
                            editorInstance.setValue(code);
                            
                            // Check correct mode
                            let mode = 'javascript';
                            if (filename.endsWith('.json')) {
                                mode = { name: "javascript", json: true };
                            }
                            editorInstance.setOption("mode", mode);
                        }
                    })
                    .catch(err => alert("Gagal memuat berkas: " + err));
            };

            if (activeFilePath) {
                saveCurrentFile().then(loadSelectedFile);
            } else {
                loadSelectedFile();
            }
        }

        // Auto Save on visibility change or blur
        window.addEventListener('beforeunload', saveCurrentFile);

        function saveCurrentFile() {
            if (!activeFilePath || !editorInstance) return Promise.resolve();
            
            const currentCode = editorInstance.getValue();
            
            return fetch('/api/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    path: activeFilePath,
                    content: currentCode
                })
            })
            .then(res => {
                if (res.ok) {
                    console.log('Berkas ' + activeFilePath + ' disimpan!');
                } else {
                    console.error('Gagal menyimpan otomatis.');
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
